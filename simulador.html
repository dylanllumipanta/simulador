<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Dylan | Simulador de Crédito</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="simulador.css">

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>

<body>

<header>

    <div class="logo">

        <div class="logo-icono">💳</div>

        <div>
            <h1>Banco Dylan</h1>
            <p>Confianza para tu futuro</p>
        </div>

    </div>

</header>

<div class="container">

    <h2>Datos Financieros</h2>

    <label for="txtIngresos">Ingresos</label>
    <input type="text" id="txtIngresos">
    <small id="error_txtIngresos" class="error"></small>

    <label for="txtEgresos">Egresos</label>
    <input type="text" id="txtEgresos">
    <small id="error_txtEgresos" class="error"></small>

    <div class="resultado">
        <span>Disponible</span>
        <strong id="spnDisponible"></strong>
    </div>

    <div class="resultado">
        <span>Capacidad de pago</span>
        <strong id="spnCapacidadPago"></strong>
    </div>

    <hr>

    <h2>Solicitud de Crédito</h2>

    <label for="txtMonto">Monto solicitado</label>
    <input type="text" id="txtMonto">
    <small id="error_txtMonto" class="error"></small>

    <label for="txtPlazo">Plazo (años)</label>
    <input type="text" id="txtPlazo">
    <small id="error_txtPlazo" class="error"></small>

    <label for="txtTasaInteres">Tasa de interés (%)</label>
    <input type="text" id="txtTasaInteres">
    <small id="error_txtTasaInteres" class="error"></small>

    <div class="resultado">
        <span>Interés</span>
        <strong id="spnInteresPagar"></strong>
    </div>

    <div class="resultado">
        <span>Total préstamo</span>
        <strong id="spnTotalPrestamo"></strong>
    </div>

    <div class="resultado">
        <span>Cuota mensual</span>
        <strong id="spnCuotaMensual"></strong>
    </div>

    <div class="estado">
        <h3 id="spnEstadoCredito">ANALIZANDO...</h3>
    </div>

    <div class="buttons">

        <button id="btnCalcularCredito">
            Calcular Crédito
        </button>

        <button id="btnReiniciar">
            Reiniciar
        </button>

    </div>

</div>

</body>
</html>
